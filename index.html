<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Subway Platform Display</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d12;
    --bg2: #12151e;
    --bg3: #1a1e2a;
    --border: #2a2f3d;
    --text: #f0f2f7;
    --text-dim: #8890a8;
    --text-dimmer: #4e5568;
    --cyan: #38d9f5;
    --green: #2ecc71;
    --red: #e74c3c;
    --blue-panel: #141929;
    --blue-border: #1e2d50;
    --active-tab: #1d2c4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 24px 24px;
  }

  .context-header { text-align: center; margin-bottom: 12px; }
  .context-title {
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1.5px;
    color: var(--text-dimmer);
    text-transform: uppercase;
  }

  .station-selector {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    background: var(--bg2);
    padding: 6px;
    border-radius: 12px;
    border: 1px solid var(--border);
    flex-wrap: wrap;
    justify-content: center;
  }
  .station-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .station-btn:hover { color: var(--text); background: var(--bg3); }
  .station-btn.active {
    background: var(--active-tab);
    color: var(--cyan);
    border-color: var(--blue-border);
  }

  .display {
    width: 100%;
    max-width: 1300px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .top-bar {
    padding: 16px 32px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    background: var(--bg3);
  }
  .station-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .platform-label {
    font-size: 15px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.3px;
  }
  .time {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .trains {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--border);
  }
  .train-panel {
    padding: 18px 28px;
    border-right: 1px solid var(--border);
  }
  .train-panel:last-child { border-right: none; }

  .train-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .line-circle {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 22px;
    flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
  }
  .lc-red    { background: #ee352e; color: #fff; }
  .lc-green  { background: #00933c; color: #fff; }
  .lc-orange { background: #ff6319; color: #fff; }
  .lc-yellow { background: #fccc0a; color: #1a1a1a; }
  .lc-gray   { background: #808183; color: #fff; }
  .lc-purple { background: #b933ad; color: #fff; }
  .lc-blue   { background: #0039a6; color: #fff; }
  .lc-brown  { background: #996633; color: #fff; }

  /* Raw color values for dynamic styling */
  .raw-red    { --line-color: #ee352e; --line-color-rgb: 238,53,46; --line-text: #fff; }
  .raw-green  { --line-color: #00933c; --line-color-rgb: 0,147,60;  --line-text: #fff; }
  .raw-orange { --line-color: #ff6319; --line-color-rgb: 255,99,25; --line-text: #fff; }
  .raw-yellow { --line-color: #fccc0a; --line-color-rgb: 252,204,10;--line-text: #1a1a1a; }
  .raw-gray   { --line-color: #808183; --line-color-rgb: 128,129,131;--line-text:#fff; }
  .raw-purple { --line-color: #b933ad; --line-color-rgb: 185,51,173;--line-text: #fff; }
  .raw-blue   { --line-color: #0039a6; --line-color-rgb: 0,57,166;  --line-text: #fff; }
  .raw-brown  { --line-color: #996633; --line-color-rgb: 153,102,51;--line-text: #fff; }

  .train-direction { flex: 1; }
  .direction-main { font-size: 20px; font-weight: 700; line-height: 1.2; }
  .direction-via { font-size: 14px; color: var(--text-dim); margin-top: 3px; }

  .arrivals {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .badge {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
  }
  .badge-arriving {
    background: rgba(46,204,113,0.15);
    color: var(--green);
    border: 1px solid rgba(46,204,113,0.3);
  }
  .badge-time {
    background: var(--bg3);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .board-box {
    border-radius: 10px;
    padding: 16px 18px;
    border: 1px solid;
    /* color set dynamically via inline style */
  }
  .board-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1.4px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .board-exit {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 5px;
  }
  .board-transfer {
    font-size: 15px;
    font-weight: 400;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .platform-section {
    padding: 16px 32px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1.5px;
    color: var(--text-dimmer);
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .platform-strip {
    display: flex;
    align-items: center;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .platform-strip::-webkit-scrollbar { height: 3px; }
  .platform-strip::-webkit-scrollbar-track { background: var(--bg3); }
  .platform-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .car-connector {
    height: 3px;
    width: 10px;
    background: var(--border);
    flex-shrink: 0;
  }

  .car-box {
    min-width: 90px;
    height: 62px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text-dimmer);
    flex-shrink: 0;
    transition: all 0.25s;
    padding: 4px 8px;
    gap: 4px;
  }
  .car-num {
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
  }
  .car-sublabel {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    line-height: 1;
    text-transform: uppercase;
  }

  .car-box.you {
    background: rgba(46,204,113,0.12);
    border-color: rgba(46,204,113,0.5);
    color: var(--green);
  }
  .car-box.board-here {
    background: rgba(56,217,245,0.1);
    border-color: rgba(56,217,245,0.4);
  }
  .car-box.board-here .car-num { color: var(--text-dim); }
  .car-box.board-here .car-sublabel { color: var(--cyan); }

  .staircase-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    padding: 0 6px;
  }
  .staircase-marker {
    width: 3px;
    height: 36px;
    background: var(--text-dimmer);
    border-radius: 1px;
    opacity: 0.4;
  }

  .transfers-section { padding: 16px 32px; }
  .transfer-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .transfer-row:last-child { border-bottom: none; padding-bottom: 0; }

  .transfer-circles {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
    min-width: 90px;
  }
  .tc {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
  }

  .transfer-name { flex: 1; font-size: 17px; font-weight: 500; }
  .transfer-walk { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .walk-time {
    font-size: 15px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .urgency-bar { width: 64px; height: 4px; border-radius: 2px; }
  .urgency-green { background: linear-gradient(90deg, #2ecc71, #27ae60); }
  .urgency-red   { background: linear-gradient(90deg, #e74c3c, #c0392b); }

  @media (max-width: 700px) {
    .trains { grid-template-columns: 1fr; }
    .train-panel:first-child { border-right: none; border-bottom: 1px solid var(--border); }
    .top-bar { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<div class="context-header">
  <div class="context-title">NYC Subway Platform Display</div>
</div>

<div class="station-selector">
  <button class="station-btn active" onclick="setStation(0)">Grand Central 42 St</button>
  <button class="station-btn" onclick="setStation(1)">Union Sq 14 St</button>
  <button class="station-btn" onclick="setStation(2)">Fulton St</button>
</div>

<div class="display">
  <div class="top-bar">
    <div>
      <div class="station-name" id="stationName"></div>
      <div class="platform-label" id="platformLabel"></div>
    </div>
    <div class="time" id="stationTime"></div>
  </div>
  <div class="trains" id="trainsContainer"></div>
  <div class="platform-section">
    <div class="section-label">Platform Map</div>
    <div class="platform-strip" id="platformStrip"></div>
  </div>
  <div class="transfers-section">
    <div class="section-label">Nearby Transfers · Walking Time</div>
    <div id="transfersList"></div>
  </div>
</div>

<script>
const LINE_COLORS = {
  '1':'lc-red','2':'lc-red','3':'lc-red',
  '4':'lc-green','5':'lc-green','6':'lc-green',
  '7':'lc-purple',
  'A':'lc-blue','C':'lc-blue','E':'lc-blue',
  'B':'lc-orange','D':'lc-orange','F':'lc-orange','M':'lc-orange',
  'N':'lc-yellow','Q':'lc-yellow','R':'lc-yellow','W':'lc-yellow',
  'G':'lc-green','J':'lc-brown','Z':'lc-brown',
  'L':'lc-gray','S':'lc-gray',
};

const LINE_RAW = {
  'lc-red':    { bg: '#ee352e', rgb: '238,53,46',   text: '#fff'     },
  'lc-green':  { bg: '#00933c', rgb: '0,147,60',    text: '#fff'     },
  'lc-orange': { bg: '#ff6319', rgb: '255,99,25',   text: '#fff'     },
  'lc-yellow': { bg: '#fccc0a', rgb: '252,204,10',  text: '#1a1a1a'  },
  'lc-gray':   { bg: '#808183', rgb: '128,129,131', text: '#fff'     },
  'lc-purple': { bg: '#b933ad', rgb: '185,51,173',  text: '#fff'     },
  'lc-blue':   { bg: '#0039a6', rgb: '0,57,166',    text: '#fff'     },
  'lc-brown':  { bg: '#996633', rgb: '153,102,51',  text: '#fff'     },
};

const STATIONS = [
  {
    name: 'Grand Central · 42 St',
    platformLabel: 'Platform B · Uptown 4 / 5 / 6',
    time: '6:49 PM',
    trains: [
      {
        line: '4',
        direction: 'Uptown / Bronx',
        via: 'via Lexington Ave',
        arrivals: [{label:'Arriving',type:'arriving'},{label:'8 min',type:'time'},{label:'14 min',type:'time'}],
        exit: 'Exit at 42 St / Times Square, front 2 cars',
        transfer: 'Transfer at 86 St, rear cars'
      },
      {
        line: '5',
        direction: 'Downtown / Brooklyn',
        via: 'express via Lexington Ave',
        arrivals: [{label:'3 min',type:'time'},{label:'11 min',type:'time'},{label:'19 min',type:'time'}],
        exit: 'Exit at Fulton St / Financial District, any car',
        transfer: 'Transfer at Union Sq, middle cars'
      }
    ],
    platformCfg: { cars: 8, you: 3, boardHere: [6,7], staircase: 4 },
    transfers: [
      { lines:['B','D','F'], name:'6 Av / Bryant Pk',  walk:'~4 min walk', urgency:'green' },
      { lines:['S'],         name:'Times Sq Shuttle',  walk:'~2 min walk', urgency:'green' },
      { lines:['1','2','3'], name:'7 Av / Times Sq',   walk:'~6 min walk', urgency:'red'   },
    ]
  },
  {
    name: 'Union Sq · 14 St',
    platformLabel: 'Platform A · Downtown 4 / 5 / 6',
    time: '6:53 PM',
    trains: [
      {
        line: '6',
        direction: 'Uptown / Bronx',
        via: 'local, Lexington Ave',
        arrivals: [{label:'2 min',type:'time'},{label:'9 min',type:'time'},{label:'16 min',type:'time'}],
        exit: 'Exit at 14 St / Union Square, any car',
        transfer: 'Transfer at Grand Central, rear cars'
      },
      {
        line: '5',
        direction: 'Downtown / Brooklyn',
        via: 'express via Lexington Ave',
        arrivals: [{label:'Arriving',type:'arriving'},{label:'5 min',type:'time'},{label:'12 min',type:'time'}],
        exit: 'Exit at Fulton St / Financial District, any car',
        transfer: 'Transfer at Brooklyn Bridge, front cars'
      }
    ],
    platformCfg: { cars: 8, you: 5, boardHere: [1,2], staircase: 3 },
    transfers: [
      { lines:['L'],             name:'14 St / 8th Ave',  walk:'~3 min walk', urgency:'green' },
      { lines:['N','Q','R','W'], name:'14 St / Union Sq', walk:'~1 min walk', urgency:'green' },
      { lines:['F','M'],         name:'14 St / 6th Ave',  walk:'~5 min walk', urgency:'green' },
    ]
  },
  {
    name: 'Fulton St',
    platformLabel: 'Platform C · Downtown 2 / 3',
    time: '6:58 PM',
    trains: [
      {
        line: '2',
        direction: 'Downtown / Brooklyn',
        via: 'via 7th Ave',
        arrivals: [{label:'Arriving',type:'arriving'},{label:'7 min',type:'time'}],
        exit: 'Exit at Fulton St / Financial District, any car',
        transfer: 'Transfer to A / C / J / Z, follow signs'
      },
      {
        line: '3',
        direction: 'Uptown / Harlem',
        via: 'via 7th Ave',
        arrivals: [{label:'4 min',type:'time'},{label:'11 min',type:'time'}],
        exit: 'Exit at 34 St / Penn Station, front cars',
        transfer: 'Transfer at 14 St, rear cars'
      }
    ],
    platformCfg: { cars: 8, you: 4, boardHere: [7], staircase: 5 },
    transfers: [
      { lines:['A','C'], name:'Fulton St / Broadway',  walk:'~2 min walk', urgency:'green' },
      { lines:['J','Z'], name:'Fulton St / Nassau',    walk:'~3 min walk', urgency:'green' },
      { lines:['4','5'], name:'Fulton St / Lexington', walk:'~1 min walk', urgency:'green' },
    ]
  }
];

function lc(line) { return LINE_COLORS[line] || 'lc-gray'; }
function raw(line) { return LINE_RAW[lc(line)]; }

function renderTrains(trains) {
  return trains.map(t => {
    const r = raw(t.line);
    const boardBoxStyle = `background: rgba(${r.rgb},0.12); border-color: rgba(${r.rgb},0.4);`;
    const labelStyle = `color: ${r.bg};`;
    return `
    <div class="train-panel">
      <div class="train-header">
        <div class="line-circle ${lc(t.line)}">${t.line}</div>
        <div class="train-direction">
          <div class="direction-main">${t.direction}</div>
          <div class="direction-via">${t.via}</div>
        </div>
      </div>
      <div class="arrivals">
        ${t.arrivals.map(a =>
          `<span class="badge badge-${a.type === 'arriving' ? 'arriving' : 'time'}">${a.label}</span>`
        ).join('')}
      </div>
      <div class="board-box" style="${boardBoxStyle}">
        <div class="board-label" style="${labelStyle}">BOARD HERE FOR</div>
        <div class="board-exit">${t.exit}</div>
        <div class="board-transfer">${t.transfer}</div>
      </div>
    </div>
  `;
  }).join('');
}

function renderPlatform(cfg) {
  let html = '';
  for (let i = 1; i <= cfg.cars; i++) {
    if (i > 1) html += '<div class="car-connector"></div>';

    if (i === cfg.staircase + 1) {
      html = html.slice(0, html.lastIndexOf('<div class="car-connector"></div>'));
      html += `
        <div class="car-connector"></div>
        <div class="staircase-wrap"><div class="staircase-marker"></div></div>
        <div class="car-connector"></div>
      `;
    }

    let cls = 'car-box';
    let sublabel = '';

    if (i === cfg.you) {
      cls += ' you';
      sublabel = 'YOU';
    } else if (cfg.boardHere.includes(i)) {
      cls += ' board-here';
      sublabel = 'BOARD';
    }

    html += `
      <div class="${cls}">
        <div class="car-num">car ${i}</div>
        ${sublabel ? `<div class="car-sublabel">${sublabel}</div>` : ''}
      </div>`;
  }
  return html;
}

function renderTransfers(transfers) {
  return transfers.map(t => `
    <div class="transfer-row">
      <div class="transfer-circles">
        ${t.lines.map(l => `<div class="tc ${lc(l)}">${l}</div>`).join('')}
      </div>
      <div class="transfer-name">${t.name}</div>
      <div class="transfer-walk">
        <span class="walk-time">${t.walk}</span>
        <div class="urgency-bar urgency-${t.urgency}"></div>
      </div>
    </div>
  `).join('');
}

function setStation(idx) {
  const s = STATIONS[idx];
  document.getElementById('stationName').textContent = s.name;
  document.getElementById('platformLabel').textContent = s.platformLabel;
  document.getElementById('stationTime').textContent = s.time;
  document.getElementById('trainsContainer').innerHTML = renderTrains(s.trains);
  document.getElementById('platformStrip').innerHTML = renderPlatform(s.platformCfg);
  document.getElementById('transfersList').innerHTML = renderTransfers(s.transfers);
  document.querySelectorAll('.station-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
}

setStation(0);
</script>
</body>
</html>
